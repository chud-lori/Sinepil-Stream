services:
  sinepilstream:
    build: .
    container_name: sinepilstream
    restart: unless-stopped
    ports:
      - "3500:3500"
    environment:
      - NODE_ENV=production
      - PORT=3500
    # Cap container memory. Node ~100MB + idle Chromium ~150MB + active page ~200MB
    # leaves headroom inside 800M. Headless auto-closes after 5min idle (see
    # lib/headless.js). If we breach, Docker OOMs the container and `restart`
    # brings it back — better than swap-thrashing the host.
    mem_limit: 800m
    volumes:
      - sinepilstream_data:/app/data   # named volume — lives in /var/lib/docker/volumes/, NOT in the project dir
      - ./logs:/app/logs

volumes:
  sinepilstream_data:
