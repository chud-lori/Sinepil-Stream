services:
  sinepilstream:
    build: .
    container_name: sinepilstream
    restart: unless-stopped
    ports:
      - "3500:3500"
    environment:
      - NODE_ENV=production
      - PORT=3500
    volumes:
      - sinepilstream_data:/app/data   # named volume — lives in /var/lib/docker/volumes/, NOT in the project dir
      - ./logs:/app/logs

volumes:
  sinepilstream_data:
